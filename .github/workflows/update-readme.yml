name: Update README Activity

on:
  schedule:
    - cron: "0 0 * * *"   # every day at midnight UTC
  workflow_dispatch:        # allow manual trigger from Actions tab

jobs:
  update-readme:
    name: Update README with latest GitHub activity
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update README with recent GitHub activity
        uses: Readme-Workflows/recent-activity@v2.4.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          CONFIG_FILE: .github/recent-activity.config.yml

      - name: Commit and push if README changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "github-actions[bot]"
          git diff --quiet && git diff --staged --quiet || (
            git add README.md &&
            git commit -m "chore: update README activity [skip ci]" &&
            git push
          )
